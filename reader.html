<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjM2I3ZGYzIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjN2Q1Y2ZmIi8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9InVybCgjZykiLz48cGF0aCBkPSJNMzIgMTR2LTVsLTggOCA4IDh2LTVjNi42MyAwIDEyIDUuMzcgMTIgMTIgMCAyLjAyLS41IDMuOTQtMS40IDUuNmwyLjkyIDIuOTJDNDcuMDggMzcuMDYgNDggMzQuNjMgNDggMzJjMC04Ljg0LTcuMTYtMTYtMTYtMTZ6bTAgMjhjLTYuNjMgMC0xMi01LjM3LTEyLTEyIDAtMi4wMi41LTMuOTQgMS40LTUuNmwtMi45Mi0yLjkyQzE2LjkyIDI2Ljk0IDE2IDI5LjM3IDE2IDMyYzAgOC44NCA3LjE2IDE2IDE2IDE2djVsOC04LTgtOHY1eiIgZmlsbD0id2hpdGUiLz48L3N2Zz4=">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader · PageSync</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #060709;
            color: #e6e7e8;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* ── Topbar ──────────────────────────────────────────────── */
        .reader-topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(6,7,9,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 12px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #9aa0ad;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
            touch-action: manipulation;
        }
        .back-btn:hover { background: rgba(255,255,255,0.08); color: #e6e7e8; }

        .reader-title {
            font-size: 14px;
            font-weight: 600;
            color: #c0c8d8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reader-chapter-label {
            font-size: 12px;
            color: #505870;
            white-space: nowrap;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .quality-toggle {
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #8f97a5;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            touch-action: manipulation;
        }
        .quality-toggle:hover { background: rgba(255,255,255,0.08); color: #e6e7e8; }
        .quality-toggle.active { background: rgba(59,125,243,0.15); border-color: rgba(59,125,243,0.3); color: #7aabff; }

        /* ── Chapter nav bar ─────────────────────────────────────── */
        .chapter-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(6,7,9,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.06);
            gap: 12px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #9aa0ad;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: #e6e7e8; }
        .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .page-progress {
            font-size: 13px;
            color: #606880;
            text-align: center;
            flex: 1;
        }

        .page-progress strong { color: #c0c8d8; }

        /* ── Chapter select dropdown ─────────────────────────────── */
        .chapter-select {
            padding: 9px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #101318;
            color: #c0c8d8;
            font-size: 13px;
            cursor: pointer;
            max-width: 160px;
            touch-action: manipulation;
        }
        .chapter-select:focus { outline: none; border-color: rgba(59,125,243,0.4); }

        /* ── Reader area ─────────────────────────────────────────── */
        .reader-area {
            padding-top: 58px;
            padding-bottom: 66px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Pages ───────────────────────────────────────────────── */
        .pages-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .page-wrapper {
            width: 100%;
            position: relative;
            background: #0a0c10;
        }

        .page-img {
            display: block;
            width: 100%;
            height: auto;
            user-select: none;
        }

        .page-img.loading {
            min-height: 400px;
        }

        /* Page skeleton */
        .page-skeleton {
            width: 100%;
            min-height: 500px;
            background: linear-gradient(90deg,
                rgba(255,255,255,0.03) 25%,
                rgba(255,255,255,0.06) 50%,
                rgba(255,255,255,0.03) 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s infinite linear;
        }

        @keyframes shimmer {
            0%   { background-position: -600px 0; }
            100% { background-position:  600px 0; }
        }

        /* ── Loading / error states ──────────────────────────────── */
        .state-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            text-align: center;
            padding: 40px 20px;
        }

        .state-icon { font-size: 48px; opacity: 0.3; }

        .state-box h2 {
            font-size: 20px;
            font-weight: 700;
            color: #4a5060;
        }

        .state-box p { font-size: 14px; color: #383e4e; max-width: 280px; line-height: 1.6; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.06);
            border-top-color: #3b7df3;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── End of chapter card ─────────────────────────────────── */
        .end-card {
            width: 100%;
            max-width: 800px;
            padding: 48px 24px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin-top: 8px;
        }

        .end-card h3 { font-size: 18px; font-weight: 700; color: #4a5060; margin-bottom: 8px; }
        .end-card p  { font-size: 14px; color: #383e4e; margin-bottom: 24px; }

        .end-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        .btn-next-chapter {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: #3b7df3;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            touch-action: manipulation;
        }
        .btn-next-chapter:hover { background: #5a93f7; }
        .btn-next-chapter:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-back-manga {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: #9aa0ad;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            touch-action: manipulation;
        }

        /* ── Responsive ──────────────────────────────────────────── */
        @media (max-width: 600px) {
            .reader-title { font-size: 13px; }
            .reader-chapter-label { display: none; }
            .quality-toggle { display: none; }
            .chapter-select { max-width: 120px; font-size: 12px; }
            .nav-btn { padding: 9px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- Topbar -->
    <header class="reader-topbar">
        <div class="topbar-left">
            <a class="back-btn" id="back-btn" href="#">← Back</a>
            <div style="min-width:0">
                <div class="reader-title"  id="manga-title">Loading…</div>
                <div class="reader-chapter-label" id="chapter-label"></div>
            </div>
        </div>
        <div class="topbar-right">
            <button class="quality-toggle active" id="quality-btn" title="Toggle image quality">HQ</button>
            <select class="chapter-select" id="chapter-select"></select>
        </div>
    </header>

    <!-- Reader area -->
    <div class="reader-area" id="reader-area">
        <div class="state-box">
            <div class="spinner"></div>
            <h2>Loading chapter…</h2>
        </div>
    </div>

    <!-- Bottom nav -->
    <nav class="chapter-nav">
        <button class="nav-btn" id="prev-btn" disabled>← Prev</button>
        <div class="page-progress" id="page-progress"></div>
        <button class="nav-btn" id="next-btn" disabled>Next →</button>
    </nav>

    <script type="module">
        // ── Parse URL params ───────────────────────────────────────
        const params    = new URLSearchParams(window.location.search);
        const chapterId = params.get('chapter');
        const mangaId   = params.get('manga');
        const mangaTitle= params.get('title') || 'Manga';
        const backUrl   = params.get('back')  || (mangaId ? `book.html?id=${mangaId}&source=mangadex` : 'home.html');

        // ── State ──────────────────────────────────────────────────
        let allChapters  = [];   // [{id, chapter, title}]
        let currentIndex = -1;
        let pages        = [];
        let highQuality  = true;
        let loadedCount  = 0;

        // ── DOM ────────────────────────────────────────────────────
        const readerArea    = document.getElementById('reader-area');
        const mangaTitleEl  = document.getElementById('manga-title');
        const chapterLabel  = document.getElementById('chapter-label');
        const chapterSelect = document.getElementById('chapter-select');
        const prevBtn       = document.getElementById('prev-btn');
        const nextBtn       = document.getElementById('next-btn');
        const qualityBtn    = document.getElementById('quality-btn');
        const pageProgress  = document.getElementById('page-progress');
        const backBtn       = document.getElementById('back-btn');

        backBtn.href = backUrl;
        mangaTitleEl.textContent = decodeURIComponent(mangaTitle);

        // ── Quality toggle ─────────────────────────────────────────
        qualityBtn.addEventListener('click', () => {
            highQuality = !highQuality;
            qualityBtn.textContent = highQuality ? 'HQ' : 'LQ';
            qualityBtn.classList.toggle('active', highQuality);
            if (pages.length) renderPages(pages);
        });

        // ── Fetch chapter list ─────────────────────────────────────
        async function loadChapterList() {
            if (!mangaId) return;
            try {
                const res  = await fetch(`/api/manga/chapters?id=${mangaId}`);
                const data = await res.json();
                allChapters = (data.data || []).map(ch => ({
                    id:      ch.id,
                    chapter: ch.attributes?.chapter || '?',
                    title:   ch.attributes?.title   || '',
                    volume:  ch.attributes?.volume  || null,
                }));

                // Populate dropdown
                chapterSelect.innerHTML = allChapters.map((ch, i) =>
                    `<option value="${i}">Ch. ${ch.chapter}${ch.title ? ` — ${ch.title}` : ''}</option>`
                ).join('');

                // Find current chapter index
                currentIndex = allChapters.findIndex(ch => ch.id === chapterId);
                if (currentIndex === -1 && allChapters.length) currentIndex = 0;
                if (currentIndex !== -1) chapterSelect.value = currentIndex;

                updateNavButtons();
            } catch (err) {
                console.error('Failed to load chapter list:', err);
            }
        }

        // ── Chapter select change ──────────────────────────────────
        chapterSelect.addEventListener('change', e => {
            const idx = Number(e.target.value);
            if (allChapters[idx]) {
                currentIndex = idx;
                loadChapter(allChapters[idx].id, allChapters[idx]);
            }
        });

        // ── Nav buttons ────────────────────────────────────────────
        function updateNavButtons() {
            prevBtn.disabled = currentIndex <= 0;
            nextBtn.disabled = currentIndex >= allChapters.length - 1;
        }

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                chapterSelect.value = currentIndex;
                loadChapter(allChapters[currentIndex].id, allChapters[currentIndex]);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < allChapters.length - 1) {
                currentIndex++;
                chapterSelect.value = currentIndex;
                loadChapter(allChapters[currentIndex].id, allChapters[currentIndex]);
            }
        });

        // ── Load chapter pages ─────────────────────────────────────
        async function loadChapter(id, chapterMeta) {
            window.scrollTo({ top: 0 });

            // Update labels
            const label = `Chapter ${chapterMeta?.chapter || '?'}${chapterMeta?.title ? ` — ${chapterMeta.title}` : ''}`;
            chapterLabel.textContent = label;
            document.title = `${label} · ${decodeURIComponent(mangaTitle)} · PageSync`;

            // Update URL without reload
            const newParams = new URLSearchParams(window.location.search);
            newParams.set('chapter', id);
            history.replaceState(null, '', `?${newParams.toString()}`);

            updateNavButtons();

            readerArea.innerHTML = `
                <div class="state-box">
                    <div class="spinner"></div>
                    <h2>Loading pages…</h2>
                </div>`;

            try {
                const res  = await fetch(`/api/manga/pages?id=${id}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                pages = highQuality ? (data.pages || []) : (data.pagesSaver || data.pages || []);

                if (!pages.length) {
                    readerArea.innerHTML = `
                        <div class="state-box">
                            <div class="state-icon">📭</div>
                            <h2>No pages found</h2>
                            <p>This chapter may not be available yet.</p>
                        </div>`;
                    return;
                }

                renderPages(pages, chapterMeta);
            } catch (err) {
                console.error('Failed to load pages:', err);
                readerArea.innerHTML = `
                    <div class="state-box">
                        <div class="state-icon">⚠️</div>
                        <h2>Could not load chapter</h2>
                        <p>${err.message}</p>
                    </div>`;
            }
        }

        // ── Render pages ───────────────────────────────────────────
        function renderPages(pageUrls, chapterMeta) {
            loadedCount = 0;
            const total = pageUrls.length;

            readerArea.innerHTML = `
                <div class="pages-container" id="pages-container"></div>
                <div class="end-card" id="end-card" style="display:none">
                    <h3>End of Chapter ${chapterMeta?.chapter || '?'}</h3>
                    <p>You've reached the end. Continue reading?</p>
                    <div class="end-actions">
                        <button class="btn-next-chapter" id="end-next-btn" ${currentIndex >= allChapters.length - 1 ? 'disabled' : ''}>
                            Next Chapter →
                        </button>
                        <a class="btn-back-manga" href="${backUrl}">Back to Manga</a>
                    </div>
                </div>`;

            const container = document.getElementById('pages-container');
            const endCard   = document.getElementById('end-card');
            const endNextBtn= document.getElementById('end-next-btn');

            endNextBtn?.addEventListener('click', () => {
                if (currentIndex < allChapters.length - 1) {
                    currentIndex++;
                    chapterSelect.value = currentIndex;
                    loadChapter(allChapters[currentIndex].id, allChapters[currentIndex]);
                }
            });

            pageProgress.innerHTML = `<strong>0</strong> / ${total} pages`;

            // Render each page
            pageUrls.forEach((url, i) => {
                const wrapper  = document.createElement('div');
                wrapper.className = 'page-wrapper';

                const skeleton = document.createElement('div');
                skeleton.className = 'page-skeleton';
                wrapper.appendChild(skeleton);

                const img     = document.createElement('img');
                img.className = 'page-img';
                img.alt       = `Page ${i + 1}`;
                img.loading   = i < 3 ? 'eager' : 'lazy';
                img.decoding  = 'async';

                img.addEventListener('load', () => {
                    skeleton.remove();
                    loadedCount++;
                    pageProgress.innerHTML = `<strong>${loadedCount}</strong> / ${total} pages`;
                    if (loadedCount === total) {
                        endCard.style.display = '';
                    }
                });

                img.addEventListener('error', () => {
                    skeleton.style.background = 'rgba(200,50,50,0.1)';
                    skeleton.style.animation  = 'none';
                    skeleton.style.minHeight  = '80px';
                    skeleton.innerHTML = `<p style="color:#604040;font-size:12px;padding:16px;text-align:center">Failed to load page ${i+1}</p>`;
                });

                img.src = url;
                wrapper.appendChild(img);
                container.appendChild(wrapper);
            });
        }

        // ── Scroll-based page progress ─────────────────────────────
        const observer = new IntersectionObserver(entries => {
            let maxPage = 0;
            document.querySelectorAll('.page-wrapper').forEach((el, i) => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.6) maxPage = i + 1;
            });
            if (maxPage > 0 && pages.length) {
                pageProgress.innerHTML = `<strong>${maxPage}</strong> / ${pages.length} pages`;
            }
        }, { threshold: 0.1 });

        // ── Init ───────────────────────────────────────────────────
        async function init() {
            await loadChapterList();

            if (!chapterId && allChapters.length) {
                // No chapter specified — load first one
                loadChapter(allChapters[0].id, allChapters[0]);
            } else if (chapterId) {
                const meta = allChapters.find(ch => ch.id === chapterId);
                loadChapter(chapterId, meta);
            } else {
                readerArea.innerHTML = `
                    <div class="state-box">
                        <div class="state-icon">📚</div>
                        <h2>No chapter selected</h2>
                        <p>Go back and select a chapter to read.</p>
                    </div>`;
            }
        }

        init();
    </script>
</body>
</html>
