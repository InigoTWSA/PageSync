<html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password · PageSync</title>
    <link rel="stylesheet" href="css/pagesync.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .error-msg {
            font-size: 13px; color: #e05555;
            min-height: 18px; margin: 2px 0 8px 4px; text-align: left;
        }
        .success-msg {
            font-size: 13px; color: #50c878;
            min-height: 18px; margin: 2px 0 8px 4px; text-align: left;
        }
        .back-link {
            display: block; text-align: center;
            margin-top: 16px; font-size: 13px;
            color: #606880; text-decoration: none;
            transition: color 0.15s;
        }
        .back-link:hover { color: #a0a8b8; }

        /* Loading / error / success states */
        #state-loading,
        #state-invalid,
        #state-success { display: none; }

        #state-loading.active,
        #state-invalid.active,
        #state-success.active { display: block; }

        .state-icon {
            font-size: 32px; margin-bottom: 10px;
        }
        .description.center { text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">↻</div>

        <!-- Loading state -->
        <div id="state-loading">
            <h1>Verifying link…</h1>
            <p class="description center">Please wait a moment.</p>
        </div>

        <!-- Invalid / expired link -->
        <div id="state-invalid">
            <h1>Link expired</h1>
            <p class="description">This password reset link has expired or already been used. Request a new one.</p>
            <div class="submit-row">
                <a class="button primary" href="forgotpass.html" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">
                    Request new link
                </a>
            </div>
            <a class="back-link" href="login.html">← Back to login</a>
        </div>

        <!-- Reset form (shown when oobCode is valid) -->
        <div id="state-form">
            <h1>New password</h1>
            <p class="description" id="email-hint"></p>

            <form id="reset-form" novalidate>
                <div class="field password-wrapper">
                    <input type="password" id="password" placeholder="New password"
                        required autocomplete="new-password">
                    <button type="button" class="password-toggle" id="toggle-pw" aria-label="Toggle password">
                        <i class="fa-regular fa-eye" id="toggle-icon"></i>
                    </button>
                </div>

                <div class="field password-wrapper">
                    <input type="password" id="confirm" placeholder="Confirm password"
                        required autocomplete="new-password">
                    <button type="button" class="password-toggle" id="toggle-confirm" aria-label="Toggle confirm">
                        <i class="fa-regular fa-eye" id="toggle-confirm-icon"></i>
                    </button>
                </div>

                <div class="error-msg" id="reset-error"></div>

                <div class="submit-row">
                    <button type="submit" class="button primary" id="save-btn">Save new password</button>
                </div>

                <a class="back-link" href="login.html">← Back to login</a>
            </form>
        </div>

        <!-- Success state -->
        <div id="state-success">
            <h1>Password updated</h1>
            <p class="description center">Your password has been changed successfully. You can now sign in.</p>
            <div class="submit-row">
                <a class="button primary" href="login.html"
                    style="display:flex;align-items:center;justify-content:center;text-decoration:none;">
                    Sign in
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { getAuth, verifyPasswordResetCode, confirmPasswordReset }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { auth } from './firebase.js';

        const params  = new URLSearchParams(location.search);
        const mode    = params.get('mode');
        const oobCode = params.get('oobCode');

        const stateLoading = document.getElementById('state-loading');
        const stateInvalid = document.getElementById('state-invalid');
        const stateForm    = document.getElementById('state-form');
        const stateSuccess = document.getElementById('state-success');

        function show(el) {
            [stateLoading, stateInvalid, stateForm, stateSuccess].forEach(e => {
                e.style.display = 'none';
            });
            el.style.display = 'block';
        }

        // Only handle resetPassword mode; ignore verifyEmail etc.
        if (mode !== 'resetPassword' || !oobCode) {
            show(stateInvalid);
        } else {
            show(stateLoading);

            // Verify the code is still valid and get the account email
            verifyPasswordResetCode(auth, oobCode)
                .then(email => {
                    const hint = document.getElementById('email-hint');
                    hint.textContent = `for ${email}`;
                    show(stateForm);
                })
                .catch(() => {
                    show(stateInvalid);
                });
        }

        // Password toggle helpers
        function makeToggle(inputId, btnId, iconId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const input = document.getElementById(inputId);
                const icon  = document.getElementById(iconId);
                const show  = input.type === 'password';
                input.type  = show ? 'text' : 'password';
                icon.classList.toggle('fa-eye',       !show);
                icon.classList.toggle('fa-eye-slash',  show);
            });
        }
        makeToggle('password', 'toggle-pw',      'toggle-icon');
        makeToggle('confirm',  'toggle-confirm',  'toggle-confirm-icon');

        // Form submit
        document.getElementById('reset-form').addEventListener('submit', async e => {
            e.preventDefault();
            const errorEl  = document.getElementById('reset-error');
            const saveBtn  = document.getElementById('save-btn');
            const pw       = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm').value;

            errorEl.textContent = '';

            if (pw.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.';
                return;
            }
            if (pw !== confirm) {
                errorEl.textContent = 'Passwords don\'t match.';
                return;
            }

            saveBtn.disabled    = true;
            saveBtn.textContent = 'Saving…';

            try {
                await confirmPasswordReset(auth, oobCode, pw);
                show(stateSuccess);
            } catch (err) {
                saveBtn.disabled    = false;
                saveBtn.textContent = 'Save new password';
                const code = err.code || '';
                errorEl.textContent =
                    code === 'auth/expired-action-code'  ? 'This link has expired. Please request a new one.' :
                    code === 'auth/invalid-action-code'  ? 'Invalid link. Please request a new one.' :
                    code === 'auth/weak-password'        ? 'Password is too weak. Try something longer.' :
                    'Something went wrong. Please try again.';
            }
        });
    </script>
</body>
</html>
